<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      }

      .card {
        padding: 2rem 2.5rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 2rem;
        color: #1f2937;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello, World!</h1>
    </main>
  </body>
</html>
